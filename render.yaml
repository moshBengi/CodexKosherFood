services:
  - type: web
    name: kosher-food-ai-review
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-nano
      - key: APP_ENV
        value: production
      - key: CORS_ALLOW_ORIGINS
        value: "*"
